name: Package web app

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag'
        required: true
        default: 'latest'

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    name: Build & push Docker image
    outputs:
      image: ${{ steps.img.outputs.name }}
      tag: ${{ steps.img.outputs.tag }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=ref,event=branch
            type=sha,format=short

      - name: Resolve image name and tag
        id: img
        run: |
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "tag=${{ inputs.tag || github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:${{ steps.img.outputs.tag }}
            ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke-test:
    runs-on: ubuntu-latest
    name: Smoke test container
    needs: docker
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: flightlog
          POSTGRES_USER: flightlog
          POSTGRES_PASSWORD: flightlog
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flightlog -d flightlog"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Log in to GitHub container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run container
        run: |
          docker run -d --name flightlog \
            --network host \
            -e SPRING_PROFILES_ACTIVE=dev \
            -e DB_URL=jdbc:postgresql://localhost:5432/flightlog \
            -e DB_USER=flightlog \
            -e DB_PASSWORD=flightlog \
            -e LOGSTASH_ENABLED=false \
            ${{ needs.docker.outputs.image }}:${{ needs.docker.outputs.tag }}

      - name: Wait for health endpoint
        run: |
          for i in {1..30}; do
            if curl -fs http://127.0.0.1:8080/actuator/health; then
              echo "App is up"
              exit 0
            fi
            echo "Waiting for app... ($i)"
            sleep 5
          done
          echo "App failed to start"
          docker logs flightlog
          exit 1

      - name: Stop container
        if: always()
        run: docker rm -f flightlog || true
