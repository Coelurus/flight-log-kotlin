# Logstash pipeline for FlightLog application logs.
#
# - Input:  TCP 5044 receiving newline-delimited JSON from the
#           net.logstash.logback `LogstashTcpSocketAppender`.
# - Output: Elasticsearch, daily index "flightlog-YYYY.MM.dd".
#
# Open Kibana at http://localhost:5601, create index pattern
# "flightlog-*" with @timestamp as time field.

input {
  tcp {
    port  => 5044
    codec => json_lines
  }
}

filter {
  # The encoder already provides @timestamp, level, logger_name, message,
  # thread_name, plus the MDC keys (requestId, user, role, ip, method,
  # path, status, durationMs) and our customFields (app, env).
  #
  # Mark "audit" / "access" events so dashboards can filter quickly.
  if [logger_name] =~ /\.audit\./ {
    mutate { add_field => { "event_kind" => "audit" } }
  } else if [logger_name] =~ /\.access$/ {
    mutate { add_field => { "event_kind" => "access" } }
  } else {
    mutate { add_field => { "event_kind" => "app" } }
  }

  # Type duration as integer for aggregations.
  if [durationMs] {
    mutate { convert => { "durationMs" => "integer" } }
  }
  if [status] {
    mutate { convert => { "status" => "integer" } }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "flightlog-%{+YYYY.MM.dd}"
  }
  # Tee to stdout for local debugging:
  # stdout { codec => rubydebug }
}
