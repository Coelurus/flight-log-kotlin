<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8" />
    <title>Reset cache – FlightLog</title>
</head>
<body>
<h1>Reset offline cache</h1>
<p id="status">Probíhá odregistrace service workeru a mazání mezipaměti…</p>
<script>
(async () => {
    try {
        if ('serviceWorker' in navigator) {
            const regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.map((r) => r.unregister()));
        }
        if ('caches' in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map((k) => caches.delete(k)));
        }
        document.getElementById('status').textContent =
            'Hotovo. Za 2 sekundy budete přesměrováni na přihlášení.';
        setTimeout(() => { window.location.href = '/login.html'; }, 2000);
    } catch (err) {
        document.getElementById('status').textContent = 'Chyba: ' + err;
    }
})();
</script>
</body>
</html>
