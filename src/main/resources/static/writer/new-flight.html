<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0d47a1" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Let – FlightLog</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #fafafa; color: #111; margin: 0; padding: 1rem; }
        main { max-width: 700px; margin: 0 auto; background: #fff; padding: 1.5rem; border-radius: 8px;
               box-shadow: 0 4px 16px rgba(0,0,0,.08); }
        h2 { text-align: center; margin: 1.5rem 0 .75rem; font-size: 1.2rem; color: #333; }
        h3 { text-align: center; margin: 1rem 0 .5rem; font-size: 1rem; color: #555; }
        label { display: block; font-size: .85rem; font-weight: 600; margin-top: .75rem; color: #555; }
        input, select { display: block; width: 100%; padding: .6rem; margin-top: .25rem; font-size: 1rem;
                        min-height: 44px; border: 1px solid #ccc; border-radius: 4px; background: #fff; }
        input:focus, select:focus { border-color: #1976d2; outline: none; box-shadow: 0 0 0 2px rgba(25,118,210,.15); }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .field-error { color: #b71c1c; font-size: .8rem; margin-top: .2rem; min-height: .9rem; display: block; }

        /* Toggle buttons */
        .toggle-group { display: inline-flex; gap: 0; margin: .5rem 0; }
        .toggle-group button {
            padding: .5rem 1rem; font-size: .85rem; font-weight: 600; border: 1px solid #1976d2;
            background: #fff; color: #1976d2; cursor: pointer; min-height: 36px;
        }
        .toggle-group button:first-child { border-radius: 4px 0 0 4px; }
        .toggle-group button:last-child { border-radius: 0 4px 4px 0; }
        .toggle-group button:not(:first-child):not(:last-child) { border-radius: 0; border-left: none; border-right: none; }
        .toggle-group button.active { background: #1976d2; color: #fff; }

        /* Tabs */
        .tabs { display: flex; gap: .25rem; margin-bottom: 1rem; border-bottom: 2px solid #e0e0e0; }
        .tabs button { flex: 1; margin: 0; padding: .75rem .5rem; font-size: 1rem; min-height: 44px;
                       background: #eceff1; color: #455a64; border: none; border-radius: 4px 4px 0 0; font-weight: 600; cursor: pointer; }
        .tabs button.active { background: #1976d2; color: #fff; }
        .panel { display: none; }
        .panel.active { display: block; }

        /* Submit */
        button[type="submit"], button.primary {
            margin-top: 1.5rem; min-height: 48px; padding: .75rem 1.5rem; font-size: 1.1rem;
            background: #1976d2; color: #fff; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-weight: 600;
        }
        button.secondary { background: #455a64; color: #fff; border: none; border-radius: 4px; padding: .6rem 1rem;
                           margin-top: .75rem; width: 100%; min-height: 44px; cursor: pointer; font-weight: 600; }
        button.success { background: #1b5e20; color: #fff; border: none; border-radius: 4px; padding: .75rem 1.5rem;
                         width: 100%; min-height: 48px; cursor: pointer; font-weight: 600; margin-top: 1.5rem; }
        button[disabled] { background: #999 !important; cursor: not-allowed; }

        .open-flight { background: #fff3e0; border: 2px solid #ef6c00; border-radius: 6px;
                       padding: 1rem; margin-bottom: 1rem; }
        .open-flight h2 { margin: 0 0 .5rem; color: #e65100; font-size: 1.1rem; text-align: left; }
        .open-flight dl { margin: 0; display: grid; grid-template-columns: auto 1fr; gap: .25rem .75rem; font-size: .9rem; }
        .open-flight dt { font-weight: 600; color: #555; }
        .open-flight dd { margin: 0; }

        .hidden { display: none !important; }

        /* Toast */
        #toast {
            position: fixed; left: 50%; top: 1rem; transform: translateX(-50%) translateY(-20px);
            background: #263238; color: #fff; padding: .75rem 1.25rem; border-radius: 4px;
            box-shadow: 0 4px 14px rgba(0,0,0,.25); font-weight: 600; opacity: 0; pointer-events: none;
            transition: opacity .2s, transform .2s; z-index: 9999; max-width: 90vw;
            display: flex; align-items: center; gap: .65rem;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        #toast.ok    { background: #1b5e20; }
        #toast.err   { background: #b71c1c; }
        #toast.info  { background: #1976d2; }
        .spinner {
            width: 18px; height: 18px; border: 3px solid rgba(255,255,255,.35);
            border-top-color: #fff; border-radius: 50%;
            animation: spin .9s linear infinite; flex: 0 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .form-busy { position: relative; pointer-events: none; opacity: .6; }
    </style>
    <script src="/pwa-register.js" defer></script>
</head>
<body>
<main>
    <div class="tabs" role="tablist">
        <button type="button" id="tab-new" class="active" role="tab" aria-controls="panel-new">Nový let</button>
        <button type="button" id="tab-land" role="tab" aria-controls="panel-land">Přistát</button>
    </div>

    <!-- ============================== NEW FLIGHT ============================== -->
    <section id="panel-new" class="panel active" role="tabpanel">
        <p id="open-blocker" class="field-error" style="display:none">
            Máte rozletěný let — nejprve jej ukončete přistáním.
        </p>
        <form id="flight-form" novalidate>
            <!-- Top row: datetime + task -->
            <div class="row">
                <div>
                    <label for="f-datetime">Čas vzletu</label>
                    <input type="datetime-local" id="f-datetime" name="datetime" required />
                    <span class="field-error" data-for="datetime"></span>
                </div>
                <div>
                    <label for="f-task">Úloha</label>
                    <input type="text" id="f-task" name="task" required maxlength="200" placeholder="Úloha" />
                    <span class="field-error" data-for="task"></span>
                </div>
            </div>

            <!-- ==================== VLEČNÁ (Tow plane) ==================== -->
            <h2>Vlečná</h2>

            <div class="toggle-group" data-toggle="towAirplaneMode">
                <button type="button" class="active" data-value="club">Klubové</button>
                <button type="button" data-value="private">Soukromé</button>
            </div>

            <div id="tow-airplane-club">
                <label for="tow-airplane-select">Letadlo klubu</label>
                <select id="tow-airplane-select" name="towAirplaneSelect">
                    <option value="">— vyberte —</option>
                </select>
                <span class="field-error" data-for="towAirplaneSelect"></span>
            </div>
            <div id="tow-airplane-private" class="hidden">
                <label for="tow-airplane-imm">Imatrikulace</label>
                <input type="text" id="tow-airplane-imm" name="towImmatriculation" maxlength="20" style="text-transform:uppercase" placeholder="OK-XXXXX" />
                <label for="tow-airplane-type">Typ letadla</label>
                <input type="text" id="tow-airplane-type" name="towType" maxlength="100" placeholder="např. Zlín Z-42M" />
                <span class="field-error" data-for="towImmatriculation"></span>
            </div>

            <h3>Pilot</h3>
            <div class="toggle-group" data-toggle="towPilotMode">
                <button type="button" class="active" data-value="member">Člen klubu</button>
                <button type="button" data-value="guest">Host</button>
            </div>

            <div id="tow-pilot-member">
                <select id="tow-pilot-select" name="towPilotSelect">
                    <option value="">— vyberte —</option>
                </select>
                <span class="field-error" data-for="towPilotSelect"></span>
            </div>
            <div id="tow-pilot-guest" class="hidden">
                <input type="text" name="towPilotName" maxlength="50" placeholder="Jméno pilota" />
                <span class="field-error" data-for="towPilotName"></span>
            </div>

            <div class="row">
                <div>
                    <label>Kopilot</label>
                    <select id="tow-copilot-select" name="towCopilotSelect">
                        <option value="">Bez kopilota</option>
                    </select>
                </div>
                <div>
                    <label for="tow-note">Poznámka</label>
                    <input type="text" id="tow-note" name="towNote" maxlength="200" placeholder="Poznámka" />
                </div>
            </div>

            <!-- ==================== KLUZÁK (Glider) ==================== -->
            <h2>Kluzák</h2>

            <div class="toggle-group" data-toggle="gliderAirplaneMode">
                <button type="button" class="active" data-value="club">Klubové</button>
                <button type="button" data-value="private">Soukromé</button>
                <button type="button" data-value="none">Žádné</button>
            </div>

            <div id="glider-airplane-club">
                <label for="glider-airplane-select">Letadlo klubu</label>
                <select id="glider-airplane-select" name="gliderAirplaneSelect">
                    <option value="">— vyberte —</option>
                </select>
                <span class="field-error" data-for="gliderAirplaneSelect"></span>
            </div>
            <div id="glider-airplane-private" class="hidden">
                <label for="glider-airplane-imm">Imatrikulace</label>
                <input type="text" id="glider-airplane-imm" name="gliderImmatriculation" maxlength="20" style="text-transform:uppercase" placeholder="OK-XXXXX" />
                <label for="glider-airplane-type">Typ letadla</label>
                <input type="text" id="glider-airplane-type" name="gliderType" maxlength="100" placeholder="např. L-13 Blaník" />
                <span class="field-error" data-for="gliderImmatriculation"></span>
            </div>
            <div id="glider-airplane-none" class="hidden"></div>

            <div id="glider-pilot-section">
                <h3>Pilot</h3>
                <div class="toggle-group" data-toggle="gliderPilotMode">
                    <button type="button" class="active" data-value="member">Člen klubu</button>
                    <button type="button" data-value="guest">Host</button>
                </div>

                <div id="glider-pilot-member">
                    <select id="glider-pilot-select" name="gliderPilotSelect">
                        <option value="">— vyberte —</option>
                    </select>
                    <span class="field-error" data-for="gliderPilotSelect"></span>
                </div>
                <div id="glider-pilot-guest" class="hidden">
                    <input type="text" name="gliderPilotName" maxlength="50" placeholder="Jméno pilota" />
                    <span class="field-error" data-for="gliderPilotName"></span>
                </div>

                <div class="row">
                    <div>
                        <label>Kopilot</label>
                        <select id="glider-copilot-select" name="gliderCopilotSelect">
                            <option value="">Bez kopilota</option>
                        </select>
                    </div>
                    <div>
                        <label for="glider-note">Poznámka</label>
                        <input type="text" id="glider-note" name="gliderNote" maxlength="200" placeholder="Poznámka" />
                    </div>
                </div>
            </div>

            <button type="submit" id="save-btn">Start</button>
        </form>
    </section>

    <!-- ============================== LAND ============================== -->
    <section id="panel-land" class="panel" role="tabpanel">
        <h2 style="text-align:left">Přistát</h2>
        <div id="no-open" style="display:none">
            <p>Aktuálně nemáte žádný rozletěný let.</p>
        </div>
        <div id="open-flight-card" class="open-flight" style="display:none">
            <h2>Rozletěný let</h2>
            <dl>
                <dt>Pilot:</dt><dd id="of-pilot"></dd>
                <dt>Letadlo:</dt><dd id="of-airplane"></dd>
                <dt>Úkol:</dt><dd id="of-task"></dd>
                <dt>Vzlet:</dt><dd id="of-takeoff"></dd>
            </dl>
        </div>
        <form id="land-form" novalidate style="display:none">
            <label>Čas přistání
                <input type="time" name="landingTime" required />
                <span class="field-error" data-for="landingTime"></span>
            </label>
            <button type="submit" class="success" id="land-btn">Potvrdit přistání</button>
        </form>
    </section>

    <button type="button" class="secondary" id="logout">Odhlásit se</button>
</main>

<div id="toast" role="status" aria-live="polite"></div>

<script>
'use strict';

const form = document.getElementById('flight-form');
const landForm = document.getElementById('land-form');
const tabNew = document.getElementById('tab-new');
const tabLand = document.getElementById('tab-land');
const panelNew = document.getElementById('panel-new');
const panelLand = document.getElementById('panel-land');
const openBlocker = document.getElementById('open-blocker');
const saveBtn = document.getElementById('save-btn');
const landBtn = document.getElementById('land-btn');
const noOpen = document.getElementById('no-open');
const openCard = document.getElementById('open-flight-card');
const toast = document.getElementById('toast');

let openFlight = null;
let toastTimer = null;
let clubMembers = [];
let clubAirplanes = [];

// Toggle state
const toggleState = {
    towAirplaneMode: 'club',
    towPilotMode: 'member',
    gliderAirplaneMode: 'club',
    gliderPilotMode: 'member',
};

function showToast(msg, kind, opts) {
    opts = opts || {};
    toast.className = '';
    toast.classList.add('show', kind || 'info');
    toast.innerHTML = (opts.spinner ? '<span class="spinner" aria-hidden="true"></span>' : '') +
                      '<span>' + msg.replace(/[<>&]/g, function (c) {
                          return c === '<' ? '&lt;' : c === '>' ? '&gt;' : '&amp;';
                      }) + '</span>';
    if (toastTimer) clearTimeout(toastTimer);
    if (opts.sticky) return;
    toastTimer = setTimeout(hideToast, opts.duration || 3500);
}
function hideToast() {
    toast.classList.remove('show');
    if (toastTimer) { clearTimeout(toastTimer); toastTimer = null; }
}

function todayISO() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}
function nowHHmm() {
    const d = new Date();
    return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
}
function nowDatetimeLocal() {
    return todayISO() + 'T' + nowHHmm();
}
function isoToCz(iso) {
    const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(iso || '');
    return m ? (m[3] + '-' + m[2] + '-' + m[1]) : iso;
}

// Set initial datetime
document.getElementById('f-datetime').value = nowDatetimeLocal();

// ==================== Toggle logic ====================
document.querySelectorAll('.toggle-group').forEach(function (group) {
    const key = group.dataset.toggle;
    group.querySelectorAll('button').forEach(function (btn) {
        btn.addEventListener('click', function () {
            group.querySelectorAll('button').forEach(function (b) { b.classList.remove('active'); });
            btn.classList.add('active');
            toggleState[key] = btn.dataset.value;
            updateVisibility();
        });
    });
});

function updateVisibility() {
    // Tow airplane
    document.getElementById('tow-airplane-club').classList.toggle('hidden', toggleState.towAirplaneMode !== 'club');
    document.getElementById('tow-airplane-private').classList.toggle('hidden', toggleState.towAirplaneMode !== 'private');

    // Tow pilot
    document.getElementById('tow-pilot-member').classList.toggle('hidden', toggleState.towPilotMode !== 'member');
    document.getElementById('tow-pilot-guest').classList.toggle('hidden', toggleState.towPilotMode !== 'guest');

    // Glider airplane
    document.getElementById('glider-airplane-club').classList.toggle('hidden', toggleState.gliderAirplaneMode !== 'club');
    document.getElementById('glider-airplane-private').classList.toggle('hidden', toggleState.gliderAirplaneMode !== 'private');
    document.getElementById('glider-airplane-none').classList.toggle('hidden', toggleState.gliderAirplaneMode !== 'none');

    // Glider pilot section hidden if no glider
    document.getElementById('glider-pilot-section').classList.toggle('hidden', toggleState.gliderAirplaneMode === 'none');

    // Glider pilot
    document.getElementById('glider-pilot-member').classList.toggle('hidden', toggleState.gliderPilotMode !== 'member');
    document.getElementById('glider-pilot-guest').classList.toggle('hidden', toggleState.gliderPilotMode !== 'guest');
}

// ==================== Data loading ====================
function populateMemberSelects(members) {
    const selects = [
        document.getElementById('tow-pilot-select'),
        document.getElementById('tow-copilot-select'),
        document.getElementById('glider-pilot-select'),
        document.getElementById('glider-copilot-select'),
    ];
    selects.forEach(function (sel) {
        const firstOpt = sel.querySelector('option');
        sel.innerHTML = '';
        sel.appendChild(firstOpt);
        members.forEach(function (p) {
            const name = [p.firstName, p.lastName].filter(Boolean).join(' ').trim();
            if (!name) return;
            const opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name;
            sel.appendChild(opt);
        });
    });
}

// Filter copilot options to exclude selected pilot
function setupCopilotFiltering(pilotSelect, copilotSelect) {
    pilotSelect.addEventListener('change', function () {
        const selected = pilotSelect.value;
        Array.from(copilotSelect.options).forEach(function (opt) {
            if (!opt.value) return; // skip "Bez kopilota"
            opt.hidden = (opt.value === selected);
            if (opt.hidden && opt.selected) copilotSelect.value = '';
        });
    });
}
setupCopilotFiltering(document.getElementById('tow-pilot-select'), document.getElementById('tow-copilot-select'));
setupCopilotFiltering(document.getElementById('glider-pilot-select'), document.getElementById('glider-copilot-select'));

function populateAirplaneSelects(airplanes) {
    const selects = [
        document.getElementById('tow-airplane-select'),
        document.getElementById('glider-airplane-select'),
    ];
    selects.forEach(function (sel) {
        const firstOpt = sel.querySelector('option');
        sel.innerHTML = '';
        sel.appendChild(firstOpt);
        airplanes.forEach(function (a) {
            const opt = document.createElement('option');
            opt.value = a.immatriculation || '';
            opt.textContent = (a.immatriculation || '') + (a.type ? ' (' + a.type + ')' : '');
            sel.appendChild(opt);
        });
    });
}

fetch('/user', { credentials: 'include' })
    .then(function (r) { return r.ok ? r.json() : []; })
    .then(function (list) {
        clubMembers = Array.isArray(list) ? list : [];
        populateMemberSelects(clubMembers);
    })
    .catch(function () {});

fetch('/airplane', { credentials: 'include' })
    .then(function (r) { return r.ok ? r.json() : []; })
    .then(function (list) {
        clubAirplanes = Array.isArray(list) ? list : [];
        populateAirplaneSelects(clubAirplanes);
    })
    .catch(function () {});

// ==================== Tabs ====================
function clearErrors(scope) {
    (scope || document).querySelectorAll('.field-error[data-for]').forEach(function (e) { e.textContent = ''; });
}

function showTab(which) {
    tabNew.classList.toggle('active', which === 'new');
    tabLand.classList.toggle('active', which === 'land');
    panelNew.classList.toggle('active', which === 'new');
    panelLand.classList.toggle('active', which === 'land');
}

tabNew.addEventListener('click', function () { showTab('new'); });
tabLand.addEventListener('click', function () { showTab('land'); });

// ==================== Open flight ====================
async function refreshOpen() {
    try {
        const resp = await fetch('/api/writer/flights/my-open', { credentials: 'include' });
        if (resp.status === 401 || resp.status === 403) { window.location.href = '/login.html'; return; }
        if (!resp.ok) { openFlight = null; renderOpen(); return; }
        const text = await resp.text();
        openFlight = text ? JSON.parse(text) : null;
        if (openFlight && !openFlight.id) openFlight = null;
    } catch (err) {
        openFlight = null;
    }
    renderOpen();
}

function renderOpen() {
    if (openFlight) {
        openBlocker.style.display = 'block';
        saveBtn.disabled = true;
        openCard.style.display = 'block';
        landForm.style.display = 'block';
        noOpen.style.display = 'none';
        document.getElementById('of-pilot').textContent = openFlight.pilotName || '';
        document.getElementById('of-airplane').textContent =
            (openFlight.airplaneImmatriculation || '') + (openFlight.airplaneType ? ' (' + openFlight.airplaneType + ')' : '');
        document.getElementById('of-task').textContent = openFlight.task || '';
        document.getElementById('of-takeoff').textContent = (openFlight.date || '') + ' ' + (openFlight.takeoffTime || '');
        landForm.landingTime.value = nowHHmm();
        showTab('land');
    } else {
        openBlocker.style.display = 'none';
        saveBtn.disabled = false;
        openCard.style.display = 'none';
        landForm.style.display = 'none';
        noOpen.style.display = 'block';
    }
}

// ==================== Validation & Submit ====================
function getSelectedAirplane(section) {
    if (section === 'tow') {
        if (toggleState.towAirplaneMode === 'club') {
            return { imm: form.towAirplaneSelect.value, type: null };
        } else {
            return { imm: (form.towImmatriculation.value || '').trim().toUpperCase(), type: (form.towType.value || '').trim() };
        }
    } else {
        if (toggleState.gliderAirplaneMode === 'club') {
            return { imm: form.gliderAirplaneSelect.value, type: null };
        } else if (toggleState.gliderAirplaneMode === 'private') {
            return { imm: (form.gliderImmatriculation.value || '').trim().toUpperCase(), type: (form.gliderType.value || '').trim() };
        }
        return null; // none
    }
}

function getSelectedPilot(section) {
    if (section === 'tow') {
        if (toggleState.towPilotMode === 'member') return form.towPilotSelect.value;
        return (form.towPilotName.value || '').trim();
    } else {
        if (toggleState.gliderPilotMode === 'member') return form.gliderPilotSelect.value;
        return (form.gliderPilotName.value || '').trim();
    }
}

function validateFlightForm() {
    clearErrors(form);
    let firstBad = null;
    function err(name, msg) {
        const el = form.querySelector('.field-error[data-for="' + name + '"]');
        if (el) el.textContent = msg;
        if (!firstBad) firstBad = form.querySelector('[name="' + name + '"]');
    }

    if (!form.datetime.value) err('datetime', 'Zadejte čas vzletu.');
    if (!form.task.value.trim()) err('task', 'Zadejte úlohu.');

    // Tow airplane
    const towAirplane = getSelectedAirplane('tow');
    if (toggleState.towAirplaneMode === 'club' && !towAirplane.imm) err('towAirplaneSelect', 'Vyberte letadlo.');
    if (toggleState.towAirplaneMode === 'private' && !towAirplane.imm) err('towImmatriculation', 'Zadejte imatrikulaci.');

    // Tow pilot
    const towPilot = getSelectedPilot('tow');
    if (toggleState.towPilotMode === 'member' && !towPilot) err('towPilotSelect', 'Vyberte pilota.');
    if (toggleState.towPilotMode === 'guest' && !towPilot) err('towPilotName', 'Zadejte jméno pilota.');

    // Glider
    if (toggleState.gliderAirplaneMode !== 'none') {
        const gliderAirplane = getSelectedAirplane('glider');
        if (toggleState.gliderAirplaneMode === 'club' && !gliderAirplane.imm) err('gliderAirplaneSelect', 'Vyberte letadlo.');
        if (toggleState.gliderAirplaneMode === 'private' && !gliderAirplane.imm) err('gliderImmatriculation', 'Zadejte imatrikulaci.');

        const gliderPilot = getSelectedPilot('glider');
        if (toggleState.gliderPilotMode === 'member' && !gliderPilot) err('gliderPilotSelect', 'Vyberte pilota.');
        if (toggleState.gliderPilotMode === 'guest' && !gliderPilot) err('gliderPilotName', 'Zadejte jméno pilota.');
    }

    if (firstBad) { firstBad.focus(); return false; }
    return true;
}

form.addEventListener('submit', async function (ev) {
    ev.preventDefault();
    if (openFlight) {
        showToast('Nelze založit nový let, dokud není ukončen ten rozletěný.', 'err');
        showTab('land');
        return;
    }
    if (!validateFlightForm()) {
        showToast('Zkontrolujte vyplněná pole.', 'err');
        return;
    }

    // Parse datetime
    const dt = form.datetime.value; // "YYYY-MM-DDTHH:MM"
    const datePart = dt.substring(0, 10);
    const timePart = dt.substring(11, 16);

    const towAirplane = getSelectedAirplane('tow');
    const towPilot = getSelectedPilot('tow');
    const gliderAirplane = getSelectedAirplane('glider');
    const gliderPilot = toggleState.gliderAirplaneMode !== 'none' ? getSelectedPilot('glider') : null;

    const body = {
        date: isoToCz(datePart),
        takeoffTime: timePart,
        task: form.task.value.trim(),
        startType: 'TOW',
        pilotName: gliderPilot || towPilot,
        gliderImmatriculation: gliderAirplane ? gliderAirplane.imm : towAirplane.imm,
        towPilotName: towPilot,
        towImmatriculation: towAirplane.imm,
    };
    if (towAirplane.type) body.towType = towAirplane.type;
    if (gliderAirplane && gliderAirplane.type) body.gliderType = gliderAirplane.type;
    if (!gliderAirplane) {
        // No glider - tow-only flight
        body.gliderImmatriculation = towAirplane.imm;
        body.startType = 'WINCH';
    }

    saveBtn.disabled = true;
    form.classList.add('form-busy');
    showToast('Ukládám let…', 'info', { spinner: true, sticky: true });
    try {
        const resp = await fetch('/api/writer/flights', {
            method: 'POST', credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        });
        if (resp.status === 202) {
            showToast('Offline – let bude odeslán po obnovení připojení.', 'ok');
            resetForm();
            return;
        }
        const data = await resp.json().catch(function () { return {}; });
        if (!resp.ok) {
            if (data.fieldErrors) {
                Object.entries(data.fieldErrors).forEach(function (entry) {
                    const el = form.querySelector('.field-error[data-for="' + entry[0] + '"]');
                    if (el) el.textContent = entry[1];
                });
            }
            showToast(data.message || 'Nepodařilo se uložit let.', 'err', { duration: 5000 });
            return;
        }
        showToast(data.degradedMessage || 'Let uložen.', 'ok');
        resetForm();
        await refreshOpen();
    } catch (err) {
        showToast('Nelze se připojit k serveru.', 'err', { duration: 5000 });
    } finally {
        saveBtn.disabled = false;
        form.classList.remove('form-busy');
    }
});

function resetForm() {
    form.reset();
    document.getElementById('f-datetime').value = nowDatetimeLocal();
}

// ==================== Landing ====================
landForm.addEventListener('submit', async function (ev) {
    ev.preventDefault();
    clearErrors(landForm);
    if (!openFlight) { showToast('Žádný rozletěný let.', 'err'); return; }
    if (!/^\d{2}:\d{2}$/.test(landForm.landingTime.value)) {
        const el = landForm.querySelector('.field-error[data-for="landingTime"]');
        if (el) el.textContent = 'Zadejte čas přistání.';
        landForm.landingTime.focus();
        return;
    }
    const body = { landingTime: landForm.landingTime.value };

    landBtn.disabled = true;
    landForm.classList.add('form-busy');
    showToast('Ukládám přistání…', 'info', { spinner: true, sticky: true });
    try {
        const resp = await fetch('/api/writer/flights/' + openFlight.id + '/land', {
            method: 'POST', credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        });
        if (resp.status === 202) {
            showToast('Offline – přistání odešle se po obnovení připojení.', 'ok');
            openFlight = null; renderOpen();
            return;
        }
        const data = await resp.json().catch(function () { return {}; });
        if (!resp.ok) {
            if (data.fieldErrors) {
                Object.entries(data.fieldErrors).forEach(function (entry) {
                    const el = landForm.querySelector('.field-error[data-for="' + entry[0] + '"]');
                    if (el) el.textContent = entry[1];
                });
            }
            showToast(data.message || 'Nepodařilo se uložit přistání.', 'err', { duration: 5000 });
            return;
        }
        showToast('Přistání uloženo.', 'ok');
        await refreshOpen();
        showTab('new');
    } catch (err) {
        showToast('Nelze se připojit k serveru.', 'err', { duration: 5000 });
    } finally {
        landBtn.disabled = false;
        landForm.classList.remove('form-busy');
    }
});

document.getElementById('logout').addEventListener('click', async function () {
    try { await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' }); }
    finally { window.location.href = '/login.html'; }
});

window.addEventListener('online',  function () { showToast('Online', 'ok', { duration: 2000 }); });
window.addEventListener('offline', function () { showToast('Offline – data se uloží lokálně.', 'info', { duration: 4000 }); });

updateVisibility();
refreshOpen();
</script>
</body>
