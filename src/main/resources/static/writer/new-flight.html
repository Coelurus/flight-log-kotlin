<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0d47a1" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Let – FlightLog</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #fafafa; color: #111; margin: 0; padding: 1rem; }
        main { max-width: 640px; margin: 0 auto; background: #fff; padding: 1.5rem; border-radius: 8px;
               box-shadow: 0 4px 16px rgba(0,0,0,.08); }
        h1 { color: #0d47a1; margin-top: 0; }
        label { display: block; font-weight: 600; margin-top: 1rem; }
        input, select { display: block; width: 100%; padding: .75rem; margin-top: .25rem; font-size: 1rem;
                        min-height: 44px; border: 2px solid #999; border-radius: 4px; background: #fff; }
        input:focus, select:focus { border-color: #0d47a1; outline: none; box-shadow: 0 0 0 3px rgba(13,71,161,.15); }
        input:invalid:not(:placeholder-shown) { border-color: #b71c1c; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .field-error { color: #b71c1c; font-size: .85rem; margin-top: .25rem; min-height: 1rem; display: block; }
        .hint { display: block; color: #666; font-weight: 400; font-size: .8rem; margin-top: .15rem; }
        button { margin-top: 1.5rem; min-height: 48px; padding: .75rem 1.5rem; font-size: 1.1rem;
                 background: #0d47a1; color: #fff; border: none; border-radius: 4px; cursor: pointer; width: 100%;
                 font-weight: 600; }
        button.secondary { background: #455a64; margin-top: .75rem; }
        button.success { background: #1b5e20; }
        button[disabled] { background: #999; cursor: not-allowed; }
        #tow-fields { display: none; padding: 1rem; background: #e3f2fd; border-radius: 4px; margin-top: 1rem; }
        #tow-fields.visible { display: block; }
        .tabs { display: flex; gap: .25rem; margin-bottom: 1rem; border-bottom: 2px solid #e0e0e0; }
        .tabs button { flex: 1; margin: 0; padding: .75rem .5rem; font-size: 1rem; min-height: 44px;
                       background: #eceff1; color: #455a64; border-radius: 4px 4px 0 0; font-weight: 600; }
        .tabs button.active { background: #0d47a1; color: #fff; }
        .panel { display: none; }
        .panel.active { display: block; }
        .open-flight { background: #fff3e0; border: 2px solid #ef6c00; border-radius: 6px;
                       padding: 1rem; margin-bottom: 1rem; }
        .open-flight h2 { margin: 0 0 .5rem; color: #e65100; font-size: 1.1rem; }
        .open-flight dl { margin: 0; display: grid; grid-template-columns: auto 1fr; gap: .25rem .75rem; font-size: .9rem; }
        .open-flight dt { font-weight: 600; color: #555; }
        .open-flight dd { margin: 0; }

        /* Toast */
        #toast {
            position: fixed; left: 50%; top: 1rem; transform: translateX(-50%) translateY(-20px);
            background: #263238; color: #fff; padding: .75rem 1.25rem; border-radius: 4px;
            box-shadow: 0 4px 14px rgba(0,0,0,.25); font-weight: 600; opacity: 0; pointer-events: none;
            transition: opacity .2s, transform .2s; z-index: 9999; max-width: 90vw;
            display: flex; align-items: center; gap: .65rem;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        #toast.ok    { background: #1b5e20; }
        #toast.err   { background: #b71c1c; }
        #toast.info  { background: #0d47a1; }
        .spinner {
            width: 18px; height: 18px; border: 3px solid rgba(255,255,255,.35);
            border-top-color: #fff; border-radius: 50%;
            animation: spin .9s linear infinite; flex: 0 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .form-busy { position: relative; pointer-events: none; opacity: .6; }
    </style>
    <script src="/pwa-register.js" defer></script>
</head>
<body>
<main>
    <div class="tabs" role="tablist">
        <button type="button" id="tab-new" class="active" role="tab" aria-controls="panel-new">Nový let</button>
        <button type="button" id="tab-land" role="tab" aria-controls="panel-land">Přistát</button>
    </div>

    <!-- ============================== NEW FLIGHT ============================== -->
    <section id="panel-new" class="panel active" role="tabpanel">
        <h1>Nový let</h1>
        <p id="open-blocker" class="field-error" style="display:none">
            Máte rozletěný let — nejprve jej ukončete přistáním.
        </p>
        <form id="flight-form" novalidate>
            <label>Datum
                <input type="date" name="date" required />
                <span class="field-error" data-for="date"></span>
            </label>

            <label>Jméno pilota
                <input type="text" name="pilotName" required maxlength="50" autocomplete="off" list="pilot-list" />
                <span class="hint">Začněte psát – nabídneme členy klubu.</span>
                <span class="field-error" data-for="pilotName"></span>
            </label>
            <datalist id="pilot-list"></datalist>

            <label>Imatrikulace kluzáku
                <input type="text" name="gliderImmatriculation" required maxlength="20" autocomplete="off"
                       list="airplane-list" style="text-transform:uppercase" />
                <span class="hint">Začněte psát – nabídneme letadla klubu.</span>
                <span class="field-error" data-for="gliderImmatriculation"></span>
            </label>

            <label>Typ kluzáku <span class="hint" style="display:inline">(jen pro nové hostující letadlo)</span>
                <input type="text" name="gliderType" maxlength="100" placeholder="např. L-13 Blaník" />
                <span class="field-error" data-for="gliderType"></span>
            </label>

            <datalist id="airplane-list"></datalist>

            <label>Úkol letu
                <input type="text" name="task" required maxlength="200" />
                <span class="field-error" data-for="task"></span>
            </label>

            <div class="row">
                <label>Čas startu
                    <input type="time" name="takeoffTime" required />
                    <span class="field-error" data-for="takeoffTime"></span>
                </label>
                <label>Typ startu
                    <select name="startType" required>
                        <option value="WINCH">Naviák</option>
                        <option value="TOW">Motorové letadlo</option>
                    </select>
                </label>
            </div>

            <div id="tow-fields">
                <label>Pilot vlečného letadla
                    <input type="text" name="towPilotName" maxlength="50" autocomplete="off" list="pilot-list" />
                    <span class="field-error" data-for="towPilotName"></span>
                </label>
                <label>Imatrikulace vlečného letadla
                    <input type="text" name="towImmatriculation" maxlength="20" autocomplete="off"
                           list="airplane-list" style="text-transform:uppercase" />
                    <span class="field-error" data-for="towImmatriculation"></span>
                </label>
                <label>Typ vlečného letadla <span class="hint" style="display:inline">(jen pro nové hostující letadlo)</span>
                    <input type="text" name="towType" maxlength="100" placeholder="např. Zlín Z-42M" />
                    <span class="field-error" data-for="towType"></span>
                </label>
            </div>

            <button type="submit" id="save-btn">Uložit let</button>
        </form>
    </section>

    <!-- ============================== LAND ============================== -->
    <section id="panel-land" class="panel" role="tabpanel">
        <h1>Přistát</h1>
        <div id="no-open" style="display:none">
            <p>Aktuálně nemáte žádný rozletěný let.</p>
        </div>
        <div id="open-flight-card" class="open-flight" style="display:none">
            <h2>Rozletěný let</h2>
            <dl>
                <dt>Pilot:</dt><dd id="of-pilot"></dd>
                <dt>Letadlo:</dt><dd id="of-airplane"></dd>
                <dt>Úkol:</dt><dd id="of-task"></dd>
                <dt>Vzlet:</dt><dd id="of-takeoff"></dd>
            </dl>
        </div>
        <form id="land-form" novalidate style="display:none">
            <label>Čas přistání
                <input type="time" name="landingTime" required />
                <span class="field-error" data-for="landingTime"></span>
            </label>
            <button type="submit" class="success" id="land-btn">Potvrdit přistání</button>
        </form>
    </section>

    <button type="button" class="secondary" id="logout">Odhlásit se</button>
</main>

<div id="toast" role="status" aria-live="polite"></div>

<script>
'use strict';

const form = document.getElementById('flight-form');
const landForm = document.getElementById('land-form');
const towWrap = document.getElementById('tow-fields');
const tabNew = document.getElementById('tab-new');
const tabLand = document.getElementById('tab-land');
const panelNew = document.getElementById('panel-new');
const panelLand = document.getElementById('panel-land');
const openBlocker = document.getElementById('open-blocker');
const saveBtn = document.getElementById('save-btn');
const landBtn = document.getElementById('land-btn');
const noOpen = document.getElementById('no-open');
const openCard = document.getElementById('open-flight-card');
const toast = document.getElementById('toast');

let openFlight = null;
let toastTimer = null;

function showToast(msg, kind, opts) {
    opts = opts || {};
    toast.className = '';
    toast.classList.add('show', kind || 'info');
    toast.innerHTML = (opts.spinner ? '<span class="spinner" aria-hidden="true"></span>' : '') +
                      '<span>' + msg.replace(/[<>&]/g, function (c) {
                          return c === '<' ? '&lt;' : c === '>' ? '&gt;' : '&amp;';
                      }) + '</span>';
    if (toastTimer) clearTimeout(toastTimer);
    if (opts.sticky) return;
    toastTimer = setTimeout(hideToast, opts.duration || 3500);
}
function hideToast() {
    toast.classList.remove('show');
    if (toastTimer) { clearTimeout(toastTimer); toastTimer = null; }
}

function todayISO() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}
function nowHHmm() {
    const d = new Date();
    return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
}
function isoToCz(iso) {
    // YYYY-MM-DD -> DD-MM-YYYY (server expects this)
    const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(iso || '');
    return m ? (m[3] + '-' + m[2] + '-' + m[1]) : iso;
}

form.date.value = todayISO();
form.takeoffTime.value = nowHHmm();
// Don't allow future dates - typo prevention
form.date.max = todayISO();

// --- Pilots autocomplete (club members) ---
fetch('/user', { credentials: 'include' })
    .then(function (r) { return r.ok ? r.json() : []; })
    .then(function (list) {
        const dl = document.getElementById('pilot-list');
        if (!dl || !Array.isArray(list)) return;
        list.forEach(function (p) {
            const fullName = [p.firstName, p.lastName].filter(Boolean).join(' ').trim();
            if (!fullName) return;
            const opt = document.createElement('option');
            opt.value = fullName;
            dl.appendChild(opt);
        });
    })
    .catch(function () { /* offline / ignore */ });

// --- Airplanes autocomplete ---
fetch('/airplane', { credentials: 'include' })
    .then(function (r) { return r.ok ? r.json() : []; })
    .then(function (list) {
        const dl = document.getElementById('airplane-list');
        if (!dl || !Array.isArray(list)) return;
        list.forEach(function (a) {
            const opt = document.createElement('option');
            opt.value = a.immatriculation || '';
            opt.label = a.type || '';
            dl.appendChild(opt);
        });
    })
    .catch(function () { /* offline / ignore */ });

form.startType.addEventListener('change', function () {
    towWrap.classList.toggle('visible', form.startType.value === 'TOW');
});

function clearErrors(scope) {
    (scope || document).querySelectorAll('.field-error[data-for]').forEach(function (e) { e.textContent = ''; });
}

function showTab(which) {
    tabNew.classList.toggle('active', which === 'new');
    tabLand.classList.toggle('active', which === 'land');
    panelNew.classList.toggle('active', which === 'new');
    panelLand.classList.toggle('active', which === 'land');
}

tabNew.addEventListener('click', function () { showTab('new'); });
tabLand.addEventListener('click', function () { showTab('land'); });

async function refreshOpen() {
    try {
        const resp = await fetch('/api/writer/flights/my-open', { credentials: 'include' });
        if (resp.status === 401 || resp.status === 403) { window.location.href = '/login.html'; return; }
        if (!resp.ok) { openFlight = null; renderOpen(); return; }
        const text = await resp.text();
        openFlight = text ? JSON.parse(text) : null;
        if (openFlight && !openFlight.id) openFlight = null;
    } catch (err) {
        openFlight = null;
    }
    renderOpen();
}

function renderOpen() {
    if (openFlight) {
        openBlocker.style.display = 'block';
        saveBtn.disabled = true;
        openCard.style.display = 'block';
        landForm.style.display = 'block';
        noOpen.style.display = 'none';
        document.getElementById('of-pilot').textContent = openFlight.pilotName || '';
        document.getElementById('of-airplane').textContent =
            (openFlight.airplaneImmatriculation || '') + (openFlight.airplaneType ? ' (' + openFlight.airplaneType + ')' : '');
        document.getElementById('of-task').textContent = openFlight.task || '';
        document.getElementById('of-takeoff').textContent = (openFlight.date || '') + ' ' + (openFlight.takeoffTime || '');
        landForm.landingTime.value = nowHHmm();
        showTab('land');
    } else {
        openBlocker.style.display = 'none';
        saveBtn.disabled = false;
        openCard.style.display = 'none';
        landForm.style.display = 'none';
        noOpen.style.display = 'block';
    }
}

// Client-side validation
function validateFlightForm() {
    clearErrors(form);
    let firstBad = null;
    function err(name, msg) {
        const el = form.querySelector('.field-error[data-for="' + name + '"]');
        if (el) el.textContent = msg;
        if (!firstBad) firstBad = form.elements[name];
    }
    const d = form.date.value;
    if (!d) err('date', 'Zadejte datum.');
    else if (d > todayISO()) err('date', 'Datum nesmí být v budoucnosti.');

    if (!form.pilotName.value.trim()) err('pilotName', 'Zadejte jméno pilota.');
    const imm = form.gliderImmatriculation.value.trim();
    if (!imm) err('gliderImmatriculation', 'Zadejte imatrikulaci.');

    if (!form.task.value.trim()) err('task', 'Zadejte úkol letu.');
    if (!/^\d{2}:\d{2}$/.test(form.takeoffTime.value)) err('takeoffTime', 'Zadejte čas startu.');

    if (form.startType.value === 'TOW') {
        if (!form.towPilotName.value.trim()) err('towPilotName', 'Zadejte pilota vlečné.');
        if (!form.towImmatriculation.value.trim()) err('towImmatriculation', 'Zadejte imatrikulaci vlečné.');
    }
    if (firstBad) { firstBad.focus(); return false; }
    return true;
}

form.addEventListener('submit', async function (ev) {
    ev.preventDefault();
    if (openFlight) {
        showToast('Nelze založit nový let, dokud není ukončen ten rozletěný.', 'err');
        showTab('land');
        return;
    }
    if (!validateFlightForm()) {
        showToast('Zkontrolujte vyplněná pole.', 'err');
        return;
    }
    const raw = Object.fromEntries(new FormData(form).entries());
    const body = {
        date: isoToCz(raw.date),
        pilotName: raw.pilotName.trim(),
        gliderImmatriculation: raw.gliderImmatriculation.trim().toUpperCase(),
        task: raw.task.trim(),
        takeoffTime: raw.takeoffTime,
        startType: raw.startType,
    };
    if (raw.gliderType && raw.gliderType.trim()) body.gliderType = raw.gliderType.trim();
    if (raw.startType === 'TOW') {
        body.towPilotName = (raw.towPilotName || '').trim();
        body.towImmatriculation = (raw.towImmatriculation || '').trim().toUpperCase();
        if (raw.towType && raw.towType.trim()) body.towType = raw.towType.trim();
    }

    saveBtn.disabled = true;
    form.classList.add('form-busy');
    showToast('Ukládám let…', 'info', { spinner: true, sticky: true });
    try {
        const resp = await fetch('/api/writer/flights', {
            method: 'POST', credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        });
        if (resp.status === 202) {
            showToast('Offline – let bude odeslán po obnovení připojení.', 'ok');
            form.reset(); form.date.value = todayISO(); form.takeoffTime.value = nowHHmm();
            return;
        }
        const data = await resp.json().catch(function () { return {}; });
        if (!resp.ok) {
            if (data.fieldErrors) {
                Object.entries(data.fieldErrors).forEach(function (entry) {
                    const el = form.querySelector('.field-error[data-for="' + entry[0] + '"]');
                    if (el) el.textContent = entry[1];
                });
            }
            showToast(data.message || 'Nepodařilo se uložit let.', 'err', { duration: 5000 });
            return;
        }
        showToast(data.degradedMessage || 'Let uložen.', 'ok');
        form.reset(); form.date.value = todayISO(); form.takeoffTime.value = nowHHmm();
        await refreshOpen();
    } catch (err) {
        showToast('Nelze se připojit k serveru.', 'err', { duration: 5000 });
    } finally {
        saveBtn.disabled = false;
        form.classList.remove('form-busy');
    }
});

landForm.addEventListener('submit', async function (ev) {
    ev.preventDefault();
    clearErrors(landForm);
    if (!openFlight) { showToast('Žádný rozletěný let.', 'err'); return; }
    if (!/^\d{2}:\d{2}$/.test(landForm.landingTime.value)) {
        const el = landForm.querySelector('.field-error[data-for="landingTime"]');
        if (el) el.textContent = 'Zadejte čas přistání.';
        landForm.landingTime.focus();
        return;
    }
    const body = { landingTime: landForm.landingTime.value };

    landBtn.disabled = true;
    landForm.classList.add('form-busy');
    showToast('Ukládám přistání…', 'info', { spinner: true, sticky: true });
    try {
        const resp = await fetch('/api/writer/flights/' + openFlight.id + '/land', {
            method: 'POST', credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        });
        if (resp.status === 202) {
            showToast('Offline – přistání odešle se po obnovení připojení.', 'ok');
            openFlight = null; renderOpen();
            return;
        }
        const data = await resp.json().catch(function () { return {}; });
        if (!resp.ok) {
            if (data.fieldErrors) {
                Object.entries(data.fieldErrors).forEach(function (entry) {
                    const el = landForm.querySelector('.field-error[data-for="' + entry[0] + '"]');
                    if (el) el.textContent = entry[1];
                });
            }
            showToast(data.message || 'Nepodařilo se uložit přistání.', 'err', { duration: 5000 });
            return;
        }
        showToast('Přistání uloženo.', 'ok');
        await refreshOpen();
        showTab('new');
    } catch (err) {
        showToast('Nelze se připojit k serveru.', 'err', { duration: 5000 });
    } finally {
        landBtn.disabled = false;
        landForm.classList.remove('form-busy');
    }
});

document.getElementById('logout').addEventListener('click', async function () {
    try { await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' }); }
    finally { window.location.href = '/login.html'; }
});

window.addEventListener('online',  function () { showToast('Online', 'ok', { duration: 2000 }); });
window.addEventListener('offline', function () { showToast('Offline – data se uloží lokálně.', 'info', { duration: 4000 }); });

refreshOpen();
</script>
</body>
</html>
