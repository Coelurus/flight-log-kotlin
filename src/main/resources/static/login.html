<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0d47a1" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Přihlášení – FlightLog</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #fafafa; color: #111; margin: 0; padding: 1rem; }
        main { max-width: 420px; margin: 4rem auto; background: #fff; padding: 2rem; border-radius: 8px;
               box-shadow: 0 4px 16px rgba(0,0,0,.1); }
        h1 { margin-top: 0; color: #0d47a1; }
        label { display: block; font-weight: 600; margin-top: 1rem; }
        input { display: block; width: 100%; padding: .75rem; margin-top: .25rem; font-size: 1rem;
                min-height: 44px; border: 2px solid #999; border-radius: 4px; box-sizing: border-box; }
        input:focus { border-color: #0d47a1; outline: none; }
        button { margin-top: 1.5rem; min-height: 44px; min-width: 44px; padding: .75rem 1.5rem;
                 font-size: 1rem; background: #0d47a1; color: #fff; border: none; border-radius: 4px;
                 cursor: pointer; width: 100%; font-weight: 600; }
        .err { color: #b71c1c; margin-top: 1rem; min-height: 1.25rem; }
        .links { margin-top: 1rem; font-size: .9rem; }
    </style>
    <script src="/pwa-register.js" defer></script>
</head>
<body>
<main>
    <h1>FlightLog</h1>
    <form id="login-form" autocomplete="on">
        <label for="email">E-mail</label>
        <input id="email" name="email" type="email" required maxlength="254" autocomplete="username" />
        <label for="password">Heslo</label>
        <input id="password" name="password" type="password" required minlength="8" maxlength="128" autocomplete="current-password" />
        <button type="submit">Přihlásit se</button>
    </form>
    <p id="err" class="err" role="alert"></p>
    <div class="links">
        <a href="#" id="forgot">Zapomenuté heslo?</a>
    </div>
</main>
<script>
const form = document.getElementById('login-form');
const errBox = document.getElementById('err');
form.addEventListener('submit', async (ev) => {
    ev.preventDefault();
    errBox.textContent = '';
    const body = { email: form.email.value.trim(), password: form.password.value };
    try {
        const resp = await fetch('/api/auth/login', {
            method: 'POST', credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        });
        if (!resp.ok) {
            const data = await resp.json().catch(() => ({}));
            errBox.textContent = data.message || 'Neplatný e-mail nebo heslo.';
            return;
        }
        const data = await resp.json();
        window.location.href = data.role === 'ADMIN' ? '/admin/flights.html' : '/writer/new-flight.html';
    } catch (err) {
        errBox.textContent = 'Nelze se připojit k serveru.';
    }
});
document.getElementById('forgot').addEventListener('click', async (ev) => {
    ev.preventDefault();
    const email = prompt('Zadejte e-mail pro obnovu hesla:');
    if (!email) return;
    await fetch('/api/auth/password/reset/request', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
    });
    alert('Pokud účet existuje, zaslali jsme instrukce na e-mail.');
});
</script>
</body>
</html>
