<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Flight Log</title>
    <script>
    (async () => {
        try {
            const resp = await fetch('/api/auth/me', { credentials: 'include' });
            if (resp.ok) {
                const data = await resp.json();
                window.location.href = data.role === 'ADMIN' ? '/admin/flights.html' : '/writer/new-flight.html';
                return;
            }
        } catch (_) {}
        window.location.href = '/login.html';
    })();
    </script>
</head>
<body>
</body>
</html>
