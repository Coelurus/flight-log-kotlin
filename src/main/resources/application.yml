spring:
  application:
    name: flight-log-kotlin
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/flightlog}
    username: ${DB_USER:flightlog}
    password: ${DB_PASSWORD:flightlog}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    open-in-view: false
  flyway:
    enabled: true
    # Schema is now fully managed by Flyway (V1__baseline.sql + V2 onward).
    # baseline-on-migrate stays true so existing DBs that were already
    # baselined at version 1 by an earlier deployment continue to work; on a
    # fresh empty DB Flyway baselines at version 0 and then runs V1+.
    baseline-on-migrate: true
    baseline-version: "0"
    locations: classpath:db/migration
  web:
    resources:
      static-locations: classpath:/static/
  mvc:
    static-path-pattern: /**

server:
  port: 8080
  compression:
    enabled: true
  servlet:
    session:
      timeout: 30m
      cookie:
        name: FLSESSION
        http-only: true
        same-site: lax

flightlog:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:}
  club-users-api: http://vyuka.profinit.eu:8080/
  integration:
    use-stub: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    root: INFO
    eu.profinit.flightlog: INFO
