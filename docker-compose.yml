services:
  postgres:
    image: postgres:16-alpine
    container_name: flightlog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: flightlog
      POSTGRES_USER: flightlog
      POSTGRES_PASSWORD: flightlog
    ports:
      - "5432:5432"
    volumes:
      - flightlog-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flightlog -d flightlog"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Web UI for browsing the database. Open http://localhost:5050 and log in
  # with admin@flightlog.dev / admin. Then add a new server:
  #   Host: postgres   Port: 5432   User: flightlog   Password: flightlog
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: flightlog-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@flightlog.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - flightlog-pgadmin:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  flightlog-pgdata:
  flightlog-pgadmin:
