services:
  postgres:
    image: postgres:16-alpine
    container_name: flightlog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: flightlog
      POSTGRES_USER: flightlog
      POSTGRES_PASSWORD: flightlog
    ports:
      - "5432:5432"
    volumes:
      - flightlog-pgdata:/var/lib/postgresql/data:z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flightlog -d flightlog"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Web UI for browsing the database. Open http://localhost:5050 and log in
  # with admin@flightlog.dev / admin. Then add a new server:
  #   Host: postgres   Port: 5432   User: flightlog   Password: flightlog
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: flightlog-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@flightlog.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - flightlog-pgadmin:/var/lib/pgadmin:z
    depends_on:
      postgres:
        condition: service_healthy

  # ============================== ELK stack ==============================
  # Single-node Elasticsearch 8 with security disabled (DEV only).
  # UI: http://localhost:5601 (Kibana). Index pattern: flightlog-*
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: flightlog-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - bootstrap.memory_lock=false
      - cluster.routing.allocation.disk.threshold_enabled=false
    ports:
      - "9200:9200"
    volumes:
      - flightlog-esdata:/usr/share/elasticsearch/data:z
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s

  # Logstash receives JSON events from the app via TCP 5044
  # and indexes them into Elasticsearch.
  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.3
    container_name: flightlog-logstash
    restart: unless-stopped
    environment:
      - LS_JAVA_OPTS=-Xms128m -Xmx128m
      - xpack.monitoring.enabled=false
    ports:
      - "5044:5044"   # app -> logstash (json over TCP)
    volumes:
      - ./elk/logstash/pipeline:/usr/share/logstash/pipeline:ro,Z
    depends_on:
      elasticsearch:
        condition: service_healthy

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    container_name: flightlog-kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - XPACK_SECURITY_ENABLED=false
      - XPACK_REPORTING_ENABLED=false
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

  # ============================== Application ==============================
  # Spring Boot app, containerised. `docker compose up app` builds the image
  # from the Dockerfile and brings up Postgres + ELK first.
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: flightlog/app:latest
    container_name: flightlog-app
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/flightlog
      DB_USER: flightlog
      DB_PASSWORD: flightlog
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: "5044"
      LOGSTASH_ENABLED: "true"
      ENV: docker
      JAVA_OPTS: "-XX:MaxRAMPercentage=75.0"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      logstash:
        condition: service_started

volumes:
  flightlog-pgdata:
  flightlog-pgadmin:
  flightlog-esdata:
