apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: elasticsearch-data
  namespace: flightlog
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch
  namespace: flightlog
spec:
  serviceName: elasticsearch
  replicas: 1
  selector:
    matchLabels: { app: elasticsearch }
  template:
    metadata:
      labels: { app: elasticsearch }
    spec:
      # ES needs higher vm.max_map_count than the cluster default on some
      # clusters; on managed kubernetes ask your admin to set it on the node.
      initContainers:
        - name: fix-perms
          image: busybox:1.36
          command: ["sh","-c","chown -R 1000:1000 /usr/share/elasticsearch/data || true"]
          volumeMounts:
            - { name: data, mountPath: /usr/share/elasticsearch/data }
          securityContext: { runAsUser: 0 }
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
          ports:
            - { containerPort: 9200, name: http }
            - { containerPort: 9300, name: transport }
          env:
            - { name: discovery.type,                   value: single-node }
            - { name: xpack.security.enabled,           value: "false" }
            - { name: xpack.security.http.ssl.enabled,  value: "false" }
            - { name: ES_JAVA_OPTS,                     value: "-Xms512m -Xmx512m" }
            - { name: bootstrap.memory_lock,            value: "false" }
            - { name: cluster.routing.allocation.disk.threshold_enabled, value: "false" }
          readinessProbe:
            httpGet: { path: /_cluster/health, port: http }
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          volumeMounts:
            - { name: data, mountPath: /usr/share/elasticsearch/data }
          resources:
            requests: { cpu: "200m", memory: "1Gi" }
            limits:   { cpu: "2",    memory: "2Gi" }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: elasticsearch-data
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: flightlog
spec:
  selector: { app: elasticsearch }
  ports:
    - { name: http, port: 9200, targetPort: 9200 }
