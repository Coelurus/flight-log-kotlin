apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-pipeline
  namespace: flightlog
data:
  flightlog.conf: |
    input {
      tcp {
        port  => 5044
        codec => json_lines
      }
    }
    filter {
      if [logger_name] =~ /\.audit\./ {
        mutate { add_field => { "event_kind" => "audit" } }
      } else if [logger_name] =~ /\.access$/ {
        mutate { add_field => { "event_kind" => "access" } }
      } else {
        mutate { add_field => { "event_kind" => "app" } }
      }
      if [durationMs] { mutate { convert => { "durationMs" => "integer" } } }
      if [status]     { mutate { convert => { "status"     => "integer" } } }
    }
    output {
      elasticsearch {
        hosts => ["http://elasticsearch:9200"]
        index => "flightlog-%{+YYYY.MM.dd}"
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
  namespace: flightlog
spec:
  replicas: 1
  selector:
    matchLabels: { app: logstash }
  template:
    metadata:
      labels: { app: logstash }
    spec:
      containers:
        - name: logstash
          image: docker.elastic.co/logstash/logstash:8.15.3
          ports:
            - { containerPort: 5044, name: tcp }
          env:
            - { name: LS_JAVA_OPTS, value: "-Xms256m -Xmx256m" }
            - { name: xpack.monitoring.enabled, value: "false" }
          volumeMounts:
            - { name: pipeline, mountPath: /usr/share/logstash/pipeline }
          resources:
            requests: { cpu: "100m", memory: "512Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
      volumes:
        - name: pipeline
          configMap: { name: logstash-pipeline }
---
apiVersion: v1
kind: Service
metadata:
  name: logstash
  namespace: flightlog
spec:
  selector: { app: logstash }
  ports:
    - { name: tcp, port: 5044, targetPort: 5044 }
