apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  namespace: flightlog
spec:
  replicas: 1
  selector:
    matchLabels: { app: kibana }
  template:
    metadata:
      labels: { app: kibana }
    spec:
      containers:
        - name: kibana
          image: docker.elastic.co/kibana/kibana:8.15.3
          ports:
            - { containerPort: 5601, name: http }
          env:
            - { name: ELASTICSEARCH_HOSTS,    value: "http://elasticsearch:9200" }
            - { name: XPACK_SECURITY_ENABLED, value: "false" }
            - { name: XPACK_REPORTING_ENABLED, value: "false" }
          readinessProbe:
            httpGet: { path: /api/status, port: http }
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          resources:
            requests: { cpu: "100m", memory: "512Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: kibana
  namespace: flightlog
spec:
  selector: { app: kibana }
  ports:
    - { name: http, port: 5601, targetPort: 5601 }
  type: ClusterIP
